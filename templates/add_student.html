<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Add Student</title>
<link rel="stylesheet" href="/static/form.css">
</head>

<body>

<div class="container">

    <div class="form-box">
        <h2>Add Student Data</h2>

        <form id="studentForm">
            <input type="number" id="student_id" placeholder="Student ID" required>
            <input type="text" id="name" placeholder="Student Name" required>

            <input type="number" id="age" placeholder="Age" required>

            <select id="gender" required>
                <option value="">Select Gender</option>
                <option>Male</option>
                <option>Female</option>
            </select>

            <input type="number" id="attendance" placeholder="Attendance (%)" required>

            <input type="number" id="marks" placeholder="Average Marks" required>

            <input type="number" id="income" placeholder="Family Income" required>

            <button type="submit">Submit</button>

        </form>

        <button class="back-btn" onclick="goBack()">← Back to Dashboard</button>
    </div>

</div>
<script>
document.getElementById("studentForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const name = document.getElementById("name").value;
    const age = parseInt(document.getElementById("age").value);
    const gender = document.getElementById("gender").value;
    const attendance = parseFloat(document.getElementById("attendance").value);
    const marks = parseFloat(document.getElementById("marks").value);
    const income = parseInt(document.getElementById("income").value);

    const API = "http://127.0.0.1:8000";

    try {
        // ================= STEP 1: CREATE STUDENT =================
        const res1 = await fetch(`${API}/students`, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                name,
                age,
                gender,
                income_level: income < 3000 ? "low" : "medium",
                parent_education: "unknown"
            })
        });

        const student = await res1.json();
        const studentId = student.id;   // ✅ IMPORTANT

        // ================= STEP 2: ACADEMIC =================
        await fetch(`${API}/academic`, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                student_id: studentId,
                attendance,
                marks
            })
        });

        // ================= STEP 3: PREDICTION =================
        const res3 = await fetch(`${API}/predict/${studentId}`, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                attendance,
                marks,
                age,
                gender: gender === "Male" ? 0 : 1,
                income_level: income < 3000 ? 0 : 1   // ✅ FIXED KEY
            })
        });

        const result = await res3.json();

        alert(`Risk: ${result.risk_level} (${result.dropout_risk})`);

        window.location.href = "index.html";

    } catch (error) {
        console.error(error);
        alert("Error connecting to backend.");
    }
});

// BACK BUTTON
function goBack() {
    window.location.href = "index.html";
}
</script>

</body>
</html>
